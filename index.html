<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Transformer Dashboard</title>
<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

<!-- LOCK SCREEN -->
<div id="lockScreen" class="lock">
  <div class="lock-card">
    <h2>⚡ Transformer System</h2>
    <p>Secure Access</p>
    <input id="pass" placeholder="Enter Password">
    <button onclick="unlock()">Unlock</button>
  </div>
</div>

<!-- APP -->
<div id="app" class="hidden">

<header>
  <h2>TRANSFORMER HEALTH DASHBOARD</h2>
  <span class="status">● Operational</span>
</header>

<div class="layout">

  <!-- SIDEBAR -->
  <aside>
    <h3>Menu</h3>
    <ul>
      <li onclick="show('dashboard')">Dashboard</li>
      <li onclick="show('analytics')">Analytics</li>
      <li onclick="show('settings')">Settings</li>
    </ul>
  </aside>

  <!-- MAIN -->
  <main id="dashboard">

    <div class="grid">

      <div class="card large">
        <h3>System Overview</h3>
        <canvas id="mainChart"></canvas>
      </div>

      <div class="card">
        <h3>Temperature</h3>
        <div class="value" id="temp"></div>
        <canvas class="mini" id="tempChart"></canvas>
      </div>

      <div class="card">
        <h3>Voltage</h3>
        <div class="value" id="volt"></div>
        <canvas class="mini" id="voltChart"></canvas>
      </div>

      <div class="card">
        <h3>Current</h3>
        <div class="value" id="curr"></div>
        <canvas class="mini" id="currChart"></canvas>
      </div>

    </div>

  </main>

  <!-- ANALYTICS -->
  <section id="analytics" class="hidden">
    <h2>Analytics</h2>
    <canvas id="analyticsChart"></canvas>
  </section>

  <!-- SETTINGS -->
  <section id="settings" class="hidden">
    <h2>Settings</h2>

    <div class="card">
      <label>Max Temp</label>
      <input id="maxTemp" value="80">
      
      <label>Max Voltage</label>
      <input id="maxVolt" value="250">

      <label>Max Current</label>
      <input id="maxCurr" value="15">

      <button onclick="saveSettings()">Save</button>
    </div>
  </section>

</div>

</div>

<script src="script.js"></script>
</body>
</html>
