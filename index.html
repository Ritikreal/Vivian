<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Transformer Dashboard</title>
<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

<!-- LOCK SCREEN -->
<div id="lockScreen" class="lock">
  <div class="lock-card">
    <h2>⚡ Transformer System</h2>
    <input id="pass" placeholder="Password">
    <button onclick="unlock()">Unlock</button>
  </div>
</div>

<!-- APP -->
<div id="app" class="hidden">

<header>
  <h2>Transformer Dashboard</h2>
  <span class="status">● Operational</span>
</header>

<div class="layout">

  <!-- SIDEBAR -->
  <aside>
    <ul>
      <li onclick="showPage('dashboard')">Dashboard</li>
      <li onclick="showPage('analytics')">Analytics</li>
      <li onclick="showPage('settings')">Settings</li>
    </ul>
  </aside>

  <!-- MAIN CONTENT -->
  <main id="mainContent">

    <!-- DASHBOARD -->
    <div id="dashboard">
      <div class="grid">

        <div class="card large">
          <h3>Overview</h3>
          <canvas id="mainChart"></canvas>
        </div>

        <div class="card">
          <h3>Temperature</h3>
          <div id="temp"></div>
          <canvas id="tempChart"></canvas>
        </div>

        <div class="card">
          <h3>Voltage</h3>
          <div id="volt"></div>
          <canvas id="voltChart"></canvas>
        </div>

        <div class="card">
          <h3>Current</h3>
          <div id="curr"></div>
          <canvas id="currChart"></canvas>
        </div>

      </div>
    </div>

    <!-- ANALYTICS -->
    <div id="analytics" class="hidden">
      <h2>Analytics</h2>
      <canvas id="analyticsChart"></canvas>
    </div>

    <!-- SETTINGS -->
    <div id="settings" class="hidden">
      <h2>Settings</h2>

      <label>Max Temp</label>
      <input id="maxTemp" value="80">

      <label>Max Voltage</label>
      <input id="maxVolt" value="250">

      <label>Max Current</label>
      <input id="maxCurr" value="15">

      <button onclick="saveSettings()">Save</button>
    </div>

  </main>

</div>

</div>

<script src="script.js"></script>
</body>
</html>
