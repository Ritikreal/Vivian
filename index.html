<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Transformer Monitoring Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
    }
    header {
      padding: 20px;
      text-align: center;
      font-size: 24px;
      font-weight: bold;
      background: #020617;
      border-bottom: 1px solid #1e293b;
    }
    .container {
      padding: 20px;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 20px;
    }
    .card {
      background: #020617;
      padding: 20px;
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    }
    .value {
      font-size: 28px;
      margin-top: 10px;
    }
    .status {
      margin-top: 10px;
      font-weight: bold;
    }
    canvas {
      margin-top: 20px;
    }
  </style>
</head>
<body>
  <header>⚡ Transformer IoT Monitoring Dashboard</header>

  <div class="container">
    <div class="card">
      <h3>Temperature (°C)</h3>
      <div class="value" id="temp">--</div>
      <div class="status" id="tempStatus"></div>
    </div>

    <div class="card">
      <h3>Voltage (V)</h3>
      <div class="value" id="volt">--</div>
      <div class="status" id="voltStatus"></div>
    </div>

    <div class="card">
      <h3>Current (A)</h3>
      <div class="value" id="curr">--</div>
      <div class="status" id="currStatus"></div>
    </div>

    <div class="card" style="grid-column: span 2;">
      <h3>Live Data Graph</h3>
      <canvas id="chart"></canvas>
    </div>
  </div>

  <script>
    const ctx = document.getElementById('chart').getContext('2d');

    const data = {
      labels: [],
      datasets: [
        {
          label: 'Temperature',
          data: [],
          borderColor: '#38bdf8',
          tension: 0.3
        },
        {
          label: 'Voltage',
          data: [],
          borderColor: '#22c55e',
          tension: 0.3
        },
        {
          label: 'Current',
          data: [],
          borderColor: '#f59e0b',
          tension: 0.3
        }
      ]
    };

    const chart = new Chart(ctx, {
      type: 'line',
      data: data,
      options: {
        responsive: true,
        scales: {
          x: { ticks: { color: '#94a3b8' } },
          y: { ticks: { color: '#94a3b8' } }
        },
        plugins: {
          legend: {
            labels: { color: '#e2e8f0' }
          }
        }
      }
    });

    function getRandom(min, max) {
      return (Math.random() * (max - min) + min).toFixed(2);
    }

    function updateData() {
      const temp = getRandom(40, 100);
      const volt = getRandom(210, 260);
      const curr = getRandom(5, 20);

      document.getElementById('temp').innerText = temp;
      document.getElementById('volt').innerText = volt;
      document.getElementById('curr').innerText = curr;

      document.getElementById('tempStatus').innerText = temp > 80 ? '⚠️ High Temperature' : 'Normal';
      document.getElementById('voltStatus').innerText = volt > 250 ? '⚠️ Over Voltage' : 'Normal';
      document.getElementById('currStatus').innerText = curr > 15 ? '⚠️ Overload' : 'Normal';

      const time = new Date().toLocaleTimeString();
      data.labels.push(time);
      data.datasets[0].data.push(temp);
      data.datasets[1].data.push(volt);
      data.datasets[2].data.push(curr);

      if (data.labels.length > 10) {
        data.labels.shift();
        data.datasets.forEach(d => d.data.shift());
      }

      chart.update();
    }

    setInterval(updateData, 2000);
  </script>
</body>
</html>
