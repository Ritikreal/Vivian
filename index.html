<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Transformer Monitoring Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
body{margin:0;font-family:Segoe UI;background:#0b1220;color:#e2e8f0}
header{padding:15px;text-align:center;font-size:22px;background:#020617;border-bottom:1px solid #1e293b}
.container{padding:20px;display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:20px}
.card{background:#020617;padding:20px;border-radius:16px;box-shadow:0 10px 25px rgba(0,0,0,.4)}
.value{font-size:28px;font-weight:bold}
.status{font-size:14px;margin-top:5px}
.extra{font-size:12px;color:#94a3b8}
.hidden{display:none}
input{padding:10px;border-radius:8px;border:none;width:100%;margin:10px 0}
button{padding:10px;border:none;border-radius:8px;background:#2563eb;color:white;cursor:pointer}
nav{display:flex;gap:10px;justify-content:center;margin:10px}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="loginPage" class="container">
<div class="card" style="max-width:400px;margin:auto">
<h2>Login</h2>
<input id="user" placeholder="Username">
<input id="pass" type="password" placeholder="Password">
<button onclick="login()">Login</button>
<p id="loginMsg"></p>
</div>
</div>

<!-- DASHBOARD -->
<div id="dashboard" class="hidden">
<header>⚡ Transformer Monitoring Dashboard</header>
<nav>
<button onclick="show('dashboardView')">Dashboard</button>
<button onclick="show('settingsView')">Settings</button>
</nav>

<div id="dashboardView" class="container">
<div class="card"><h3>Temperature</h3><div id="temp" class="value"></div><div id="tempStatus" class="status"></div></div>
<div class="card"><h3>Voltage</h3><div id="volt" class="value"></div><div id="voltStatus" class="status"></div></div>
<div class="card"><h3>Current</h3><div id="curr" class="value"></div><div id="currStatus" class="status"></div></div>
<div class="card" style="grid-column: span 2;"><canvas id="chart"></canvas></div>
</div>

<!-- SETTINGS -->
<div id="settingsView" class="container hidden">
<div class="card">
<h3>Threshold Settings</h3>
<label>Max Temperature</label>
<input id="maxTemp" value="80">
<label>Max Voltage</label>
<input id="maxVolt" value="250">
<label>Max Current</label>
<input id="maxCurr" value="15">
<button onclick="saveSettings()">Save</button>
</div>
</div>
</div>

<script>
// LOGIN
function login(){
const u=document.getElementById('user').value;
const p=document.getElementById('pass').value;
if(u==='admin'&&p==='1234'){
document.getElementById('loginPage').classList.add('hidden');
document.getElementById('dashboard').classList.remove('hidden');
}else{
document.getElementById('loginMsg').innerText='Invalid credentials';
}}

function show(view){
document.getElementById('dashboardView').classList.add('hidden');
document.getElementById('settingsView').classList.add('hidden');
document.getElementById(view).classList.remove('hidden');
}

// SETTINGS
let settings={maxTemp:80,maxVolt:250,maxCurr:15};
function saveSettings(){
settings.maxTemp=parseFloat(document.getElementById('maxTemp').value);
settings.maxVolt=parseFloat(document.getElementById('maxVolt').value);
settings.maxCurr=parseFloat(document.getElementById('maxCurr').value);
alert('Saved');
}

// CHART
const ctx=document.getElementById('chart').getContext('2d');
const data={labels:[],datasets:[{label:'Temp',data:[],borderColor:'#38bdf8'},{label:'Volt',data:[],borderColor:'#22c55e'},{label:'Curr',data:[],borderColor:'#f59e0b'}]};
const chart=new Chart(ctx,{type:'line',data:data,options:{responsive:true}});

// SMOOTH VALUES
let temp=65,volt=230,curr=10;
function fluctuate(val,range){
return val + (Math.random()*range - range/2);
}

function update(){
temp=fluctuate(temp,2);
volt=fluctuate(volt,3);
curr=fluctuate(curr,1);

document.getElementById('temp').innerText=temp.toFixed(1);
document.getElementById('volt').innerText=volt.toFixed(1);
document.getElementById('curr').innerText=curr.toFixed(1);

document.getElementById('tempStatus').innerText=temp>settings.maxTemp?'⚠️ High':'Normal';
document.getElementById('voltStatus').innerText=volt>settings.maxVolt?'⚠️ High':'Normal';
document.getElementById('currStatus').innerText=curr>settings.maxCurr?'⚠️ High':'Normal';

let t=new Date().toLocaleTimeString();
data.labels.push(t);
data.datasets[0].data.push(temp);
data.datasets[1].data.push(volt);
data.datasets[2].data.push(curr);

if(data.labels.length>15){data.labels.shift();data.datasets.forEach(d=>d.data.shift());}
chart.update();
}
setInterval(update,2000);
</script>
</body>
</html>
