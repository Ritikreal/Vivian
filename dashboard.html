<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI';
  background: #070c18;
  color: white;
}

header {
  padding: 15px;
  text-align: center;
  background: #020617;
}

.container {
  padding: 20px;
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
  gap: 20px;
}

.card {
  background: #0f172a;
  padding: 20px;
  border-radius: 14px;
}

.value {
  font-size: 26px;
  font-weight: bold;
}

button {
  margin: 10px;
  padding: 10px;
  border: none;
  border-radius: 8px;
  background: #3b82f6;
  color: white;
}
</style>
</head>

<body>

<header>
⚡ Transformer Dashboard
<button onclick="logout()">Logout</button>
</header>

<div class="container">
  <div class="card">
    <h3>Temperature</h3>
    <div id="temp" class="value"></div>
  </div>

  <div class="card">
    <h3>Voltage</h3>
    <div id="volt" class="value"></div>
  </div>

  <div class="card">
    <h3>Current</h3>
    <div id="curr" class="value"></div>
  </div>

  <div class="card" style="grid-column: span 2;">
    <canvas id="chart"></canvas>
  </div>
</div>

<script>
// AUTH CHECK
if (localStorage.getItem("loggedIn") !== "true") {
  window.location.href = "index.html";
}

// LOGOUT
function logout() {
  localStorage.removeItem("loggedIn");
  window.location.href = "index.html";
}

// CHART
const ctx = document.getElementById("chart").getContext("2d");

const data = {
  labels: [],
  datasets: [
    { label: "Temp", data: [], borderColor: "#3b82f6" },
    { label: "Volt", data: [], borderColor: "#22c55e" },
    { label: "Curr", data: [], borderColor: "#f59e0b" }
  ]
};

const chart = new Chart(ctx, {
  type: "line",
  data: data
});

// SMOOTH DATA
let t = 65, v = 230, c = 10;

function smooth(x, r) {
  return x + (Math.random() * r - r/2);
}

function update() {
  t = smooth(t, 1.5);
  v = smooth(v, 2);
  c = smooth(c, 0.7);

  document.getElementById("temp").innerText = t.toFixed(1);
  document.getElementById("volt").innerText = v.toFixed(1);
  document.getElementById("curr").innerText = c.toFixed(1);

  let time = new Date().toLocaleTimeString();

  data.labels.push(time);
  data.datasets[0].data.push(t);
  data.datasets[1].data.push(v);
  data.datasets[2].data.push(c);

  if (data.labels.length > 20) {
    data.labels.shift();
    data.datasets.forEach(d => d.data.shift());
  }

  chart.update();
}

setInterval(update, 2000);
</script>

</body>
</html>
